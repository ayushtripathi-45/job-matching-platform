version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=your_jwt_secret
      - REDIS_URL=redis://redis:6379
      - PORT=5001
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001
    depends_on:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
